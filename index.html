<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login XOXO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="login-container">
    <div class="login-card">

      <div class="logo">
        <h1>XOXO</h1>
        <p>Punto de Venta</p>
      </div>

      <form>
        <div class="input-group">
          <label>ID de usuario</label>
          <input type="text" placeholder="Ingresa tu ID" />
        </div>

        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" placeholder="Ingresa tu contraseña" />
        </div>

        <div class="input-group">
          <label>Tienda</label>
          <select>
            <option>Selecciona una tienda</option>
            <option>Tienda Centro</option>
            <option>Tienda Norte</option>
            <option>Tienda Sur</option>
            <option>Tienda Principal</option>
          </select>
        </div>

        <div class="role-box">
          <label class="role-title">Tipo de usuario</label>

          <div class="roles">
            <label>
              <input type="radio" name="rol" />
              Gerente
            </label>

            <label>
              <input type="radio" name="rol" />
              Cajero
            </label>
          </div>
        </div>

        <button type="button">Iniciar sesión</button>
      </form>

    </div>
  </div>

</body>
</html>
