<div class="login-page">
  <section class="login-panel">
    <div class="brand-section">
      <div class="brand-logo">
        <span>XoXO</span>
      </div>

      <div class="brand-copy">
        <span class="brand-label"> Sistema administrativo </span>

        <h1>Bienvenido a XoXO</h1>

        <p>Inicia sesión para acceder al sistema de XoXO</p>
      </div>
    </div>

    <div class="login-card">
      <header class="login-header">
        <span class="eyebrow"> Acceso al sistema </span>

        <h2>Iniciar sesión</h2>
      </header>

      <form class="login-form" (ngSubmit)="iniciarSesion()" #loginForm="ngForm">
        <div class="form-group">
          <label for="correo"> Usuario </label>

          <div class="input-control">
            <span class="input-icon"> ✉ </span>

            <input
              id="correo"
              name="correo"
              type="text"
              placeholder="Ingresa tu usuario"
              autocomplete="username"
              [(ngModel)]="correo"
              (input)="limpiarError()"
              [disabled]="cargando"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="contrasena"> Contraseña </label>

          <div class="input-control password-control">
            <span class="input-icon"> 🔒 </span>

            <input
              id="contrasena"
              name="contrasena"
              [type]="mostrarContrasena ? 'text' : 'password'"
              placeholder="Ingresa tu contraseña"
              autocomplete="current-password"
              [(ngModel)]="contrasena"
              (input)="limpiarError()"
              [disabled]="cargando"
              required
            />

            <button
              class="toggle-password"
              type="button"
              [disabled]="cargando"
              (click)="alternarContrasena()"
              [attr.aria-label]="mostrarContrasena ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              {{ mostrarContrasena ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>

        <div class="error-message" *ngIf="error">
          <span>!</span>

          <p>{{ error }}</p>
        </div>

        <button
          class="login-button"
          type="submit"
          [disabled]="cargando || !correo.trim() || !contrasena.trim()"
        >
          {{ cargando ? 'Ingresando...' : 'Iniciar sesión' }}
        </button>
        <p style="color: red; font-size: 20px; font-weight: bold">ERROR DEBUG: {{ error }}</p>
      </form>
    </div>
  </section>

  <footer class="login-footer">
    <span> XoXO · Sistema de gestión </span>

    <span> Acceso exclusivo para personal autorizado </span>
  </footer>
</div>
