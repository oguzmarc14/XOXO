<div class="login-page">
  <div class="login-card">
    <div class="logo-box">
      <img src="XoXO.png" alt="Logo XoXO" class="logo" />
    </div>

    <h1>Bienvenido a XoXO</h1>
    <p class="subtitle">Acceso al sistema interno de la tienda</p>

    <form (ngSubmit)="iniciarSesion()">
      <div class="input-group">
        <label for="correo">Correo electrónico</label>
        <input
          id="correo"
          type="email"
          name="correo"
          [(ngModel)]="correo"
          placeholder="ejemplo@xoxo.com"
        />
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Ingresa tu contraseña"
        />
      </div>

      <p class="error" *ngIf="error">{{ error }}</p>

      <button type="submit">Entrar</button>
    </form>
    
    <div class="demo-info">
      <p><strong>Usuarios de prueba</strong></p>
      <p>Administrador: admin@xoxo.com / 1234</p>
      <p>Gerente: gerente@xoxo.com / 1234</p>
      <p>Cajero: cajero@xoxo.com / 1234</p>
    </div>
  </div>
</div>
