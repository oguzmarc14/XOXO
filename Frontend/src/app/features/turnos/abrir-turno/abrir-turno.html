<main class="turno-content">
  <section class="turno-card">
    <div class="card-heading">
      <div class="heading-icon">🕐</div>

      <div>
        <span class="eyebrow">Inicio de operaciones</span>

        <h1>Abrir turno</h1>

        <p>Registra el usuario, la tienda y el fondo inicial del turno.</p>
      </div>
    </div>

    <form class="turno-form" (ngSubmit)="abrirTurno()">
      <div class="info-grid">
        <div class="info-item">
          <span>Fecha</span>

          <strong>
            {{ fechaActual | date: 'dd/MM/yyyy' }}
          </strong>
        </div>

        <div class="info-item">
          <span>Hora</span>

          <strong>
            {{ fechaActual | date: 'HH:mm' }}
          </strong>
        </div>
      </div>

      <div class="form-group">
        <label for="usuarioId"> Usuario * </label>

        <select
          id="usuarioId"
          name="usuarioId"
          [(ngModel)]="usuarioId"
          [disabled]="enviando"
          required
        >
          <option value="">Selecciona un usuario</option>

          <option *ngFor="let usuario of usuarios" [value]="usuario._id">
            {{ usuario.nombre }} - {{ usuario.rol }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="tiendaId"> Tienda * </label>

        <select id="tiendaId" name="tiendaId" [(ngModel)]="tiendaId" [disabled]="enviando" required>
          <option value="">Selecciona una tienda</option>

          <option *ngFor="let tienda of tiendas" [value]="tienda._id">
            {{ tienda.nombre }} - {{ tienda.ciudad }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label for="numeroCaja"> Número de caja * </label>

        <input
          id="numeroCaja"
          name="numeroCaja"
          type="number"
          min="1"
          step="1"
          placeholder="Ej. 1"
          [(ngModel)]="numeroCaja"
          [disabled]="enviando"
          required
        />
      </div>

      <div class="form-group">
        <label for="montoInicial"> Fondo inicial de caja * </label>

        <div class="money-input">
          <span>$</span>

          <input
            id="montoInicial"
            name="montoInicial"
            type="number"
            min="0"
            step="0.01"
            placeholder="0.00"
            [(ngModel)]="montoInicial"
            [disabled]="enviando"
            required
          />
        </div>

        <small> Ingresa el efectivo disponible al iniciar el turno. </small>
      </div>

      <p class="error-message" *ngIf="mensajeError">
        {{ mensajeError }}
      </p>

      <p class="success-message" *ngIf="mensajeExito">
        {{ mensajeExito }}
      </p>

      <div class="form-actions">
        <a class="secondary-button" [routerLink]="dashboardRuta"> Cancelar </a>

        <button class="primary-button" type="submit" [disabled]="enviando">
          {{ enviando ? 'Abriendo...' : 'Abrir turno' }}
        </button>
      </div>
    </form>
  </section>
</main>
