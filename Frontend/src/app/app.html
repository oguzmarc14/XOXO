<div
  class="application-shell"
  [class.with-navigation]="mostrarNavegacion"
  [class.login-mode]="!mostrarNavegacion"
>
  <!-- Sidebar para usuarios con sesión iniciada -->
  <aside
    *ngIf="mostrarNavegacion"
    class="global-sidebar"
    [class.open]="menuMovilAbierto"
  >
    <div class="mobile-sidebar-header">
      <div class="mobile-brand">
        <img
          src="/XoXO.png"
          alt="Logo de XoXO"
        />

        <div>
          <strong>XoXO</strong>
          <span>{{ titulo }}</span>
        </div>
      </div>

      <button
        type="button"
        class="close-sidebar-button"
        aria-label="Cerrar menú"
        (click)="cerrarMenuMovil()"
      >
        ×
      </button>
    </div>

    <app-sidebar></app-sidebar>
  </aside>

  <section class="application-main">

    <!-- Topbar de escritorio -->
    <app-topbar
      *ngIf="
        mostrarNavegacion &&
        usuario
      "
      [titulo]="titulo"
      [subtitulo]="subtitulo"
      [usuario]="usuario"
      (revisarPerfil)="revisarPerfil()"
      (cerrarSesion)="cerrarSesion()"
    ></app-topbar>

    <!-- Pantalla correspondiente a la ruta actual -->
    <main class="application-content">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
