<header class="topbar">
  <div class="page-heading">
    <h1>{{ titulo }}</h1>

    <p *ngIf="subtitulo">
      {{ subtitulo }}
    </p>
  </div>

  <div class="user-menu">
    <button
      class="user-trigger"
      type="button"
      (click)="alternarMenuUsuario()"
    >
      <img
        [src]="usuario.avatar"
        [alt]="'Avatar de ' + usuario.rol"
        class="avatar-img"
      />

      <div class="user-trigger-info">
        <strong>{{ usuario.nombre }}</strong>
        <span>{{ usuario.rol }}</span>
      </div>

      <span
        class="chevron"
        [class.open]="menuUsuarioAbierto"
      >
        ⌄
      </span>
    </button>

    <div
      class="user-dropdown"
      *ngIf="menuUsuarioAbierto"
    >
      <div class="dropdown-header">
        <img
          [src]="usuario.avatar"
          [alt]="'Avatar de ' + usuario.rol"
          class="avatar-img large"
        />

        <div class="dropdown-user-data">
          <h3>{{ usuario.nombre }}</h3>
          <p>{{ usuario.correo }}</p>
        </div>
      </div>

      <div class="dropdown-info">
        <div class="info-row">
          <span>Rol</span>
          <strong>{{ usuario.rol }}</strong>
        </div>

        <div class="info-row">
          <span>Sucursal</span>
          <strong>{{ usuario.sucursal }}</strong>
        </div>
      </div>

      <button
        class="dropdown-logout"
        type="button"
        (click)="cerrarSesion()"
      >
        Cerrar sesión
      </button>
    </div>
  </div>
</header>
